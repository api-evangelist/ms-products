    resources:
    - name: me-calendar
      path: /me/calendar
      operations:
      - name: getmycalendar
        method: GET
        description: Get the signed-in user's default calendar
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: me-events
      path: /me/events
