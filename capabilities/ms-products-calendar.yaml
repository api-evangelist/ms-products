      name: me-calendar
      description: REST surface for me-calendar.
      operations:
      - method: GET
        name: getmycalendar
        description: Get the signed-in user's default calendar
        call: ms-products-calendar.getmycalendar
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/me/events
      name: me-events
      description: REST surface for me-events.
      operations:
      - method: GET
        name: listmyevents
        description: List the signed-in user's calendar events
        call: ms-products-calendar.listmyevents
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
